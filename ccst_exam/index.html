<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCST Networking 模擬考</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>

    <main class="exam-shell">
      <header class="topbar">
        <h1>CCST Networking 模擬考</h1>
        <p id="metaText">載入題庫中...</p>
      </header>

      <section class="card" id="questionCard">
        <div class="question-head">
          <div class="tag" id="sectionTag">-</div>
          <div class="counter" id="counterText">0 / 0</div>
        </div>

        <div class="jump-row">
          <select id="jumpSelect" aria-label="選擇題號"></select>
          <button id="jumpBtn" class="btn btn-ghost" type="button">跳至此題</button>
        </div>

        <h2 id="questionTitle">題目</h2>

        <figure class="question-image-wrap">
          <img id="questionImage" alt="題目圖像" />
        </figure>

        <pre id="questionText" class="question-text hidden"></pre>

        <p class="note" id="questionNote"></p>

        <div id="controls" class="controls"></div>

        <div class="actions">
          <button id="submitBtn" class="btn btn-primary" type="button">送出本題</button>
          <button id="nextBtn" class="btn btn-ghost" type="button" disabled>下一題</button>
        </div>

        <div id="resultBox" class="result hidden"></div>
      </section>

      <section class="card hidden" id="doneCard">
        <h2>作答完成</h2>
        <p id="summaryText"></p>
        <button id="restartBtn" class="btn btn-primary" type="button">重新開始</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
